{{- if .Values.networkPolicy.enabled }}
{{/*
Default-deny egress for both services, with minimal allow-rules:
  - gateway may reach the ledger (same namespace, label selector).
  - both components may resolve DNS via kube-system and talk to the
    kube-apiserver on 443.

Everything else — Postgres, S3, anchor bucket, tool backends — must be
allowlisted explicitly via `.Values.networkPolicy.egress`. Keeping the
default tight is deliberate: a leaky default means an operator who forgets
to review the policy gets an open policy, and this chart is specifically
for installs where that's the wrong outcome.
*/}}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "trackward.fullname" . }}-ledger
  labels:
    {{- include "trackward.labels" . | nindent 4 }}
    app.kubernetes.io/component: ledger
spec:
  podSelector:
    matchLabels:
      {{- include "trackward.ledger.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "trackward.gateway.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # DNS (in-cluster CoreDNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- with .Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "trackward.fullname" . }}-gateway
  labels:
    {{- include "trackward.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  podSelector:
    matchLabels:
      {{- include "trackward.gateway.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}
  egress:
    # Gateway → Ledger
    - to:
        - podSelector:
            matchLabels:
              {{- include "trackward.ledger.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 3000
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- with .Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
