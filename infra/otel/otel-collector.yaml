# OpenTelemetry Collector config for local dev. Receives OTLP/gRPC on :4317,
# exports spans to Jaeger (via OTLP) for inspection and to the local debug log
# so developers can see what's flowing without opening the Jaeger UI.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 512

exporters:
  debug:
    verbosity: normal
  otlp/jaeger:
    endpoint: localhost:14317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp/jaeger]
