name: security

# Supply-chain gate. cargo-deny is the single source of truth for advisories,
# licenses, registries, and git sources. Configuration lives in deny.toml,
# whose ignore entries must carry honest justifications (see AGENTS.md).
#
# Previously this workflow also ran cargo-audit and a cyclonedx SBOM upload.
# Both were dropped: cargo-audit duplicated cargo-deny's advisory check with
# a separate ignore config (audit.toml vs deny.toml), guaranteeing drift;
# the SBOM upload was unused. Fewer moving parts, one config to keep honest.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Daily run against main so newly-published advisories surface even on
    # quiet weeks. The RustSec DB updates continuously.
    - cron: "0 6 * * *"

jobs:
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
